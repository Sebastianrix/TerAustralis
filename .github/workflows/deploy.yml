name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # The production site is the static multi-page build in site/ (plain
  # HTML/CSS/JS, no build step). The legacy React app in my-app/ is retired
  # from production but kept in the repo.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Enable GitHub Pages (source = GitHub Actions) via the workflow token,
      # so deployment does not depend on the repo Settings UI being toggled
      # manually (which requires admin access the deploying account may lack).
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
