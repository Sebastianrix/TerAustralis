name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Preflight checks
        run: |
          set -euo pipefail
          docker --version
          if docker compose version >/dev/null 2>&1; then
            docker compose version
          elif docker-compose --version >/dev/null 2>&1; then
            docker-compose --version
          else
            echo "Docker Compose is not installed on this runner."
            exit 1
          fi

      - name: Deploy with Docker Compose
        run: |
          set -euo pipefail
          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          else
            DC="docker-compose"
          fi
          $DC pull --ignore-pull-failures
          $DC up -d --build --remove-orphans
          $DC ps

      - name: Post-deploy health check
        run: |
          set -euo pipefail
          command -v curl >/dev/null 2>&1
          curl -fsS http://localhost:8081/ >/dev/null
          curl -fsS http://localhost:5000/health >/dev/null || curl -fsS http://localhost:5000/ >/dev/null
