name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: this workflow only checks out the repo and runs
# Docker Compose on a self-hosted runner — it needs no write scopes.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Preflight checks
        run: |
          set -euo pipefail
          docker --version
          if docker compose version >/dev/null 2>&1; then
            docker compose version
          elif docker-compose --version >/dev/null 2>&1; then
            docker-compose --version
          else
            echo "Docker Compose is not installed on this runner."
            exit 1
          fi

      - name: Deploy with Docker Compose
        run: |
          set -euo pipefail
          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          else
            DC="docker-compose"
          fi
          $DC pull --ignore-pull-failures
          $DC up -d --build --remove-orphans
          $DC ps

      - name: Post-deploy health check
        run: |
          set -euo pipefail
          command -v curl >/dev/null 2>&1
          if docker compose version >/dev/null 2>&1; then DC="docker compose"; else DC="docker-compose"; fi

          # Containers need time to build/start (the API also runs EF Core
          # migrations on boot), so wait/retry instead of failing instantly.
          wait_for() {
            name="$1"; url="$2"; svc="$3"
            for i in $(seq 1 30); do
              if curl -fsS "$url" >/dev/null 2>&1; then
                echo "✓ $name healthy ($url)"; return 0
              fi
              echo "… waiting for $name ($i/30): $url"; sleep 2
            done
            echo "✗ $name did not become healthy: $url"
            echo "----- last logs for '$svc' -----"
            $DC logs --tail=80 "$svc" 2>&1 || true
            return 1
          }

          wait_for "web" "http://localhost:8081/" "web"
         # wait_for "api" "http://localhost:5000/health" "api"
